<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script defer src="./currency_converter_enchanced.js"></script>
    <link rel="stylesheet" href="./style.css" />
    <meta name="description" content="A fast and reliable currency converter web application built by Nondas Theofanidis using JavaScript and real-time API data. (This is the first version and is still in development...)" />
    <meta name="google-site-verification" content="rjYBdSrDsdJf_K1IDRdlibfMo7Oyc5y930GGxKhBHw4" />
    <meta name="keywords" content="Nondas, currency converter, Netlify, exchange rates, JavaScript project" />
    <title>Convert currency</title>
</head>

<body>
  
  <div class="wrapper">
      <h2>Convert Currency</h2>
      
      <div class="container--dropdown">
        <div class="dropdown dropdown--from">
          <div class="selection--container selection--container--from">
            <input type="number" step="0.10" class="from" required />
            <div class="flag--container flag--container--from"></div>
            <button type="button" class="selected selected--from">&#x2B9F</button>
            <button type="button" class="selected close--from hidden">&#x2718</button>
          </div>
          <ul class="options options--from hidden">
            <!-- <li data-value="FJD" class="code--flag">
            FJD (Fiji Dollar)
            <img src="https://currencyfreaks.com/photos/flags/fjd.png" />
          </li> -->
          </ul>
        </div>

        <div class="dropdown dropdown--to">
          <div class="selection--container selection--container--to">
            <input type="text" class="to" value="" readonly />
            <div class="flag--container flag--container--to"></div>
            <button type="button" class="selected selected--to">&#x2B9F</button>
            <button type="button" class="selected close--to hidden">&#x2718</button>
          </div>
          <ul class="options options--to hidden">
            <!-- <li data-value="FJD" class="code--flag">
            FJD (Fiji Dollar)
            <img src="https://currencyfreaks.com/photos/flags/fjd.png" />
          </li> -->
          </ul>
        </div>
      </div>
</div>
</body>
</html>
