<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="icon" type="image/svg+xml" href="./img/favicon.svg">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script defer src="./currency_converter_enchanced.js"></script>
    <link rel="stylesheet" href="./style.css" />
    <meta name="description" content="A fast and reliable currency converter web application built by Nondas Theofanidis using JavaScript and real-time API data. (This is the first version and is still in development...)" />
    <meta name="google-site-verification" content="rjYBdSrDsdJf_K1IDRdlibfMo7Oyc5y930GGxKhBHw4" />
    <meta name="keywords" content="Nondas, currency converter, Netlify, exchange rates, JavaScript project" />
    <title>Convert currency</title>
</head>

<body>
  
  <div class="wrapper">
      <h2>Convert Currency</h2>
      
      <div class="container--dropdown">
        <div class="dropdown dropdown--from">
          <div class="selection--container selection--container--from">
            <input type="number" step="0.10" class="from" required />
            <div class="flag--container flag--container--from"></div>
            <button type="button" class="selected selected--from">&#9660;</button>
            <button type="button" class="selected close--from hidden">&#x2718</button>
          </div>
          <ul class="options options--from hidden">
            <!-- <li data-value="FJD" class="code--flag">
            FJD (Fiji Dollar)
            <img src="https://currencyfreaks.com/photos/flags/fjd.png" />
          </li> -->
          </ul>
        </div>

        <button class="swap">
          <svg class="icon--swap">
            <use href="./img/icons.svg#swap-sign"></use>
          </svg>
        </button>
        
        <div class="dropdown dropdown--to">
          <div class="selection--container selection--container--to">
            <input type="text" class="to" readonly />
            <div class="flag--container flag--container--to"></div>
            <button type="button" class="selected selected--to">&#9660;</button>
            <button type="button" class="selected close--to hidden">&#x2718</button>
          </div>
          <ul class="options options--to hidden">
            <!-- <li data-value="FJD" class="code--flag">
            FJD (Fiji Dollar)
            <img src="https://currencyfreaks.com/photos/flags/fjd.png" />
          </li> -->
          </ul>
        </div>
      </div>
</div>

    <footer>
      <div class="footer-container">
        <div class="footer-top">
          <div class="footer-brand">
            <h4>Currency Converter</h4>
            <p>
              Dynamic App built with Vanilla JS.
            </p>
          </div>
          <div class="footer-api">
            <p>
             Real-time data fetching.
            </p>
          </div>
        </div>

        <div class="footer-bottom">
          <p class="copyright">
            &copy; <span id="current-year"></span> Made with 💻 & ☕ by
            <strong>Epameinondas Theofanidis</strong>
            <svg>
              <use href="./img/icons.svg#icon-my-logo"></use>
            </svg>
          </p>
          <div class="social-links">
            <a
              href="mailto:nodas.theofanidis@gmail.com"
              title="Στείλτε μου email"
              >Email</a
            >
            <a
              href="https://github.com/το-όνομά-σου"
              target="_blank"
              rel="noopener noreferrer"
              title="GitHub"
              >GitHub</a
            >
            <a
              href="https://linkedin.com/in/το-όνομά-σου"
              target="_blank"
              rel="noopener noreferrer"
              title="LinkedIn"
              >LinkedIn</a
            >
          </div>
        </div>
      </div>
    </footer>

    <script>
      document.getElementById('current-year').textContent =
        new Date().getFullYear();
    </script>
</body>
</html>
